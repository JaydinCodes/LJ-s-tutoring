[build]
  publish = "dist"

[[redirects]]
  from = "/dashboard"
  to = "/student/dashboard/"
  status = 301
  force = true

[[redirects]]
  from = "/dashboard/"
  to = "/student/dashboard/"
  status = 301
  force = true

[[redirects]]
  from = "/dashboard/assignments/*"
  to = "/student/assignments/"
  status = 301
  force = true

[[redirects]]
  from = "/dashboard/results/*"
  to = "/student/results/"
  status = 301
  force = true

[[redirects]]
  from = "/dashboard/login/*"
  to = "/dashboard/login/index.html"
  status = 200

[[redirects]]
  from = "/onboarding/student/*"
  to = "/onboarding/student/index.html"
  status = 200

[[redirects]]
  from = "/onboarding/tutor/*"
  to = "/onboarding/tutor/index.html"
  status = 200

[[redirects]]
  from = "/dashboard/student/*"
  to = "/dashboard/student/index.html"
  status = 200

[[redirects]]
  from = "/dashboard/admin/*"
  to = "/dashboard/admin/index.html"
  status = 200

[[redirects]]
  from = "/dashboard/tutor/*"
  to = "/dashboard/tutor/index.html"
  status = 200

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:3001 https:; frame-ancestors 'none';"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Cache-Control = "no-store"

[[headers]]
  for = "/tutor/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Cache-Control = "no-store"
