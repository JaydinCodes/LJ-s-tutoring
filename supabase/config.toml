project_id = "project-odysseus-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/dashboard/login/",
  "http://localhost:8080/dashboard/login/"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Disabled: the local analytics (Logflare) sidecar container fails its health
# check on Windows without a TCP-exposed Docker daemon (a documented Supabase
# CLI limitation, not specific to this project) and isn't needed for local
# dev/RLS testing.
[analytics]
enabled = false
