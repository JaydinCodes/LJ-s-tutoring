<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assignment Detail | Project Odysseus</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body data-page="assignments">
  <div class="portal-shell">
    <nav class="portal-nav">
      <div class="portal-nav-inner">
        <div class="brand"><span class="brand-badge">PO</span>Project Odysseus</div>
        <div class="nav-links">
          <a class="nav-link" data-nav="dashboard" href="/dashboard/">Dashboard</a>
          <a class="nav-link" data-nav="assignments" href="/dashboard/assignments/">Assignments</a>
          <a class="nav-link" data-nav="results" href="/dashboard/results/">Results</a>
          <a class="nav-link" data-nav="reports" href="/reports/">Reports</a>
          <a class="nav-link" data-nav="community" href="/dashboard/community/">Community</a>
          <a class="nav-link" data-nav="career" href="/dashboard/career/">Careers</a>
        </div>
      </div>
    </nav>

    <main class="portal-main">
      <section class="page-header">
        <p class="eyebrow">Assignment detail</p>
        <h1 class="page-title" id="assignmentTitle">Assignment</h1>
        <p class="page-subtitle" id="assignmentSubtitle">Loading assignment detail...</p>
      </section>

      <section class="grid two">
        <article class="panel">
          <div class="row-head">
            <h2 class="panel-title">Assignment overview</h2>
          </div>
          <div id="assignmentOverview" class="list-compact"></div>
        </article>
        <article class="panel">
          <div class="row-head">
            <h2 class="panel-title">Submission upload</h2>
          </div>
          <div id="assignmentUploadDetail" class="empty-state">
            <strong>Select an assignment to upload.</strong>
            This panel confirms file uploads once the assignment API is enabled.
          </div>
        </article>
      </section>

      <section class="panel dashboard-card dashboard-section">
        <div class="row-head">
          <h2 class="panel-title">Submission history</h2>
        </div>
        <div id="submissionHistory" class="list-compact"></div>
      </section>
    </main>
  </div>

  <script src="/assets/portal-config.js"></script>
  <script src="/assets/student/auth-guard.js"></script>
  <script src="/assets/analytics.js"></script>
  <script type="module" src="/assets/student/assignment-detail.js"></script>
</body>
</html>
