<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Sign in | Project Odysseus</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/portal.css">

<body>
  <main class="center-shell">
    <section class="panel auth-card">
      <h1 class="page-title">Student Sign in</h1>

          </svg>

        <p id="authFeedback" class="note" aria-live="polite"></p>
      </div>
    </section>
  </main>
  <script src="/assets/portal-config.js"></script>
  <script type="module" src="/dashboard/login.js"></script>
</body>
</html>
