name: App CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (lockfile-enforced)
        run: npm ci

      - name: Audit production dependencies
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && npm ci --prefix lms-api

      - name: Lint
        run: npm run lint

      - name: Schema governance check
        run: npm run schema:check --prefix lms-api

      - name: Monitoring assets validation
        run: npm run validate:monitoring

  unit-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (web helpers)
        run: node --test tests/frontend/*.test.cjs

  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/lms_test
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && npm ci --prefix lms-api

      - name: Prepare test results folder
        run: mkdir -p lms-api/test-results

      - name: Run unit tests
        run: npm run test:ci --prefix lms-api

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: lms-api/test-results/
          retention-days: 14

      - name: Unit test summary
        if: always()
        run: |
          node -e "const fs=require('fs');const p='lms-api/test-results/unit-junit.xml';if(fs.existsSync(p)){const xml=fs.readFileSync(p,'utf8');const m=xml.match(/tests=\"(\d+)\".*failures=\"(\d+)\"/);if(m){console.log('Unit tests: '+m[1]+' total, '+m[2]+' failures');}else{console.log('Unit tests: report parsed');}}" >> $GITHUB_STEP_SUMMARY

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
